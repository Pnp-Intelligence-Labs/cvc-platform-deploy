# Local development — PostgreSQL + MinIO.
# API runs natively (hot reload). Use scripts/run_local.sh.
services:
  db:
    image: postgres:16-alpine
    container_name: platform-db
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: platform
      MINIO_ROOT_PASSWORD: platform_local
    ports:
      - "9000:9000"   # S3 API (used by the API server)
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_dev:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
  minio_dev:
