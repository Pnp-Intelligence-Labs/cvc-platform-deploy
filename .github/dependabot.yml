version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # PnPBERT embedding stack — majors here change model behavior/cached
      # vectors; migrate deliberately, not via bot bump
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sentence-transformers"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/designs/figma-dashboard"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # icons-material majors must move in lockstep with @mui/material —
      # standalone bumps break the peer dep and every Vercel build (see 06-10/06-11 log)
      - dependency-name: "@mui/icons-material"
        update-types: ["version-update:semver-major"]
      # lucide-react 1.x removed brand icons (Linkedin etc.) the app uses
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      # react majors need a coordinated migration (MUI/radix peer deps), not a bot bump
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
