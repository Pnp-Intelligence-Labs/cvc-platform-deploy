name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-security:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Audit Python dependencies for CVEs
        run: |
          uv export --no-dev --format requirements-txt > /tmp/requirements.txt
          uv run pip-audit --requirement /tmp/requirements.txt --format=columns

  node-security:
    name: Node dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit npm dependencies
        run: npm audit --prefix designs/figma-dashboard --audit-level=high
