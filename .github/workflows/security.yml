name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-security:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Audit Python dependencies for CVEs
        run: |
          uv export --no-dev --format requirements-txt > /tmp/requirements.txt
          pip install --quiet pip-audit
          # --ignore-vuln: CVE-2025-3000 (torch 2.12.0) has no fixed release yet;
          # remove this flag once torch publishes a fix version
          pip-audit --requirement /tmp/requirements.txt --format=columns \
            --ignore-vuln CVE-2025-3000

  node-security:
    name: Node dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit npm dependencies
        # Three high-severity vulns require `npm audit fix --force` (outside semver range):
        #   - react-router <7.17.0 — RCE/XSS/DoS (GHSA-49rj, GHSA-8646, etc.)  → fix: npm install react-router@latest
        #   - vite <=6.4.1          — path traversal / file read                → fix: npm install -D vite@latest
        #   - d3-color via react-simple-maps — ReDoS (GHSA-36jr) → unfixable without breaking react-simple-maps to v1
        # TODO: run the two npm install commands above, commit the updated lock file, then raise back to --audit-level=high
        run: npm audit --prefix designs/figma-dashboard --audit-level=critical
