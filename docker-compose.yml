services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c max_wal_size=4GB
      -c log_min_duration_statement=200
    environment:
      POSTGRES_DB: ${DB_NAME:-platform_db}
      POSTGRES_USER: ${DB_USER:-platform}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platform} -d ${DB_NAME:-platform_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-platform}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-platform_local}
    ports:
      - "9001:9001"   # Web console (do not expose 9000 publicly — API only)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8002}:8002"
    environment:
      PYTHONPATH: /app:/app/core
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-platform_db}
      DB_USER: ${DB_USER:-platform}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ALLOW_CREDENTIALS: ${ALLOW_CREDENTIALS:-false}
      PORT: 8002
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-platform}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-platform_local}
      MINIO_BUCKET: ${MINIO_BUCKET:-platform-documents}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      # Optional — plugins use these if present; leave empty to disable
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      PROXYCURL_API_KEY: ${PROXYCURL_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./api/static:/app/api/static
      - ./plugins/installed:/app/plugins/installed:ro

volumes:
  pgdata:
  minio_data:
